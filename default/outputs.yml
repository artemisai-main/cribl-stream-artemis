outputs:
  out_artemis_s3:
    type: s3
    description: "Artemis-managed S3 bucket. Cross-account AssumeRole + ExternalID. Configured by replacing pack variables with values supplied by Artemis at integration setup."
    streamtags:
      - artemis
      - artemis-ingest
    systemFields:
      - cribl_pipe
    bucket: "REPLACE_WITH_ARTEMIS_S3_BUCKET"
    region: "us-east-1"
    keyPrefix: "REPLACE_WITH_ARTEMIS_KEY_PREFIX"
    stagePath: /tmp/cribl/artemis_s3_staging
    awsAuthenticationMethod: auto
    enableAssumeRole: true
    assumeRoleArn: "arn:aws:iam::YOUR_ARTEMIS_AWS_ACCOUNT_ID:role/cribl-stream-YOUR_INTEGRATION_ID"
    assumeRoleExternalId: "REPLACE_WITH_ARTEMIS_EXTERNAL_ID"
    durationSeconds: 3600
    signatureVersion: v4
    reuseConnections: true
    rejectUnauthorized: true
    storageClass: STANDARD
    serverSideEncryption: AES256
    format: json
    compress: gzip
    maxFileSizeMB: 32
    maxFileOpenTimeSec: 300
    maxFileIdleTimeSec: 30
    maxConcurrentFileParts: 4
    onBackpressure: block
    addIdToStagingPath: true
    deadletterEnabled: false
    objectACL: private
    emptyDirCleanupSec: 300
    baseFileName: "`'artemis-' + C.Time.strftime(_time, '%Y%m%dT%H%M%S') + '-' + Math.floor(Math.random()*1e9).toString(36)`"
    extension: gz
    partitionExpr: "`C.Time.strftime(_time, '%Y/%m/%d/%H')`"

  out_artemis_devnull:
    type: devnull
    description: "Drop sink used by the passthrough route during Pack import; flip routes to out_artemis_s3 once variables are filled in."
    streamtags:
      - artemis
