artemis_aws_account_id:
  type: string
  lib: custom
  description: "Artemis AWS account that owns the cross-account ingestion role. Provided by Artemis at integration setup."
  value: "'YOUR_ARTEMIS_AWS_ACCOUNT_ID'"

artemis_iam_role_arn:
  type: string
  lib: custom
  description: "Cross-account IAM role ARN that the Cribl Worker assumes to write into the Artemis S3 bucket."
  value: "'arn:aws:iam::YOUR_ARTEMIS_AWS_ACCOUNT_ID:role/cribl-stream-YOUR_INTEGRATION_ID'"

artemis_external_id:
  type: string
  lib: custom
  description: "STS ExternalID required by the Artemis trust policy. Treat as a shared secret."
  value: "'YOUR_ARTEMIS_EXTERNAL_ID'"

artemis_s3_bucket:
  type: string
  lib: custom
  description: "Artemis-managed S3 bucket that receives raw events. Format: <org>-all-ingested-security-logs."
  value: "'YOUR_ORG-all-ingested-security-logs'"

artemis_aws_region:
  type: string
  lib: custom
  description: "AWS region of the Artemis ingestion bucket."
  value: "'us-east-1'"

artemis_key_prefix:
  type: string
  lib: custom
  description: "S3 key prefix scoped to your integration. Provided by Artemis - includes integration_id and index_id."
  value: "'integration_id=YOUR_INTEGRATION_ID/index_id=YOUR_INDEX_ID/'"

artemis_case_webhook_url:
  type: string
  lib: custom
  description: "Cribl HTTP Source URL Artemis posts case NDJSON to. Set inside the in_artemis_cases source."
  value: "'https://YOUR_CRIBL_WORKER:10081/services/collector/event'"

artemis_case_webhook_token:
  type: string
  lib: custom
  description: "Bearer token Artemis sends with case POSTs. Generated by Artemis at integration setup."
  value: "'YOUR_ARTEMIS_CASE_TOKEN'"
